<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Previewer | ToolForge</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
     <link rel="stylesheet" href="/main-style.css">
     <style>
    /* 1. GRID SPECIFIC LAYOUT - This stays in the tool file */
    .grid-preview-area {
    max-width: 600px !important; /* Increase this number until it looks right to you */
    margin: 40px auto;
    display: grid !important;
    grid-template-columns: repeat(3, 1fr) !important;
    gap: 8px !important; /* Slightly wider gaps look better on bigger grids */
    background: #000;
    padding: 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

    .grid-item {
        aspect-ratio: 1/1;
        background: #111;
        position: relative;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .grid-item:hover { background: #1a1a1a; filter: brightness(1.2); }
    
    .grid-item img { 
        width: 100%; 
        height: 100%; 
        object-fit: cover; 
        animation: scaleIn 0.3s ease; 
    }

    .grid-item .plus-icon { 
        font-size: 1.5rem; 
        color: var(--primary); 
        opacity: 0.3; 
        transition: 0.3s; 
    }

    .grid-item:hover .plus-icon { opacity: 1; transform: scale(1.2); }

    @keyframes scaleIn { 
        from { transform: scale(1.1); opacity: 0; } 
        to { transform: scale(1); opacity: 1; } 
    }

    /* 2. OVERRIDES - Adjusting the Main CSS card for this specific tool */
    .tool-card { 
        max-width: 50px; /* Slimmer card for the grid look */
        margin: 0 auto 80px; 
    }
    
    .instruction-pill { 
        font-size: 0.8rem; 
        background: var(--glass); 
        border: 1px solid var(--border); 
        padding: 8px 20px; 
        border-radius: 50px; 
        color: #94a3b8; 
    }

    .reset-btn {
        background: transparent; 
        border: 1px solid var(--border); 
        color: #64748b;
        padding: 12px 30px; 
        border-radius: 12px; 
        cursor: pointer; 
        font-weight: 600; 
        font-size: 0.9rem; 
        transition: 0.3s;
    }
    .reset-btn:hover { border-color: var(--primary); color: var(--primary); }
    .tool-card { 
    max-width: 900px !important; /* This opens up the "room" for the grid */
    width: 95% !important; 
    padding: 40px 20px !important; 
}

.grid-preview-area {
    max-width: 600px !important; /* Now this has room to actually grow */
    width: 100% !important;
    margin: 0 auto;
}
</style>
</head>
<body>
    <nav class="nav-container"></nav> 
    <body data-theme="growth"></body>
    <div class="container">
        <a href="index.html" class="back-btn">← Creator Suite</a>
        
        <section class="tool-card">
            <h1>Grid Previewer</h1>
            <p class="subtitle" style="opacity: 0.6; margin-bottom: 40px;">Architect your aesthetic before you publish.</p>
            
            <div class="grid-preview-area" id="instaGrid">
                </div>

            <div class="control-panel">
        <button class="reset-btn" onclick="resetGrid()">Clear Preview</button>
    </div>
            
            <input type="file" id="fileInput" hidden accept="image/*">
        </section>
    </div>  

    <script>
        const grid = document.getElementById('instaGrid');
        const fileInput = document.getElementById('fileInput');
        let currentSlot = null;

        function initGrid() {
            grid.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const item = document.createElement('div');
                item.className = 'grid-item';
                item.innerHTML = '<span class="plus-icon">+</span>';
                item.onclick = () => {
                    currentSlot = item;
                    fileInput.click();
                };
                grid.appendChild(item);
            }
        }

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file && currentSlot) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    currentSlot.innerHTML = `<img src="${event.target.result}" alt="Preview">`;
                };
                reader.readAsDataURL(file);
            }
        };

        function resetGrid() {
            if(confirm("Wipe the current preview?")) initGrid();
        }

        initGrid();
    </script>
    <script src="../nav.js"></script>
</body>
</html>
