<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Tag Generator | ToolForge</title>
    <link rel="stylesheet" href="/main-style.css">
</head>
<body data-theme="technical">

<div class="container">
    <nav class="nav-container"></nav>
    
    <section class="tool-card">
        <h1>Meta Tag Gen</h1>
        <p>Forge perfect SEO tags for Google & Social Media preview.</p>
        
        <input type="text" id="title" placeholder="Site Title" oninput="update()">
        <textarea id="desc" rows="3" placeholder="Site Description" oninput="update()"></textarea>
        <input type="text" id="url" placeholder="Site URL" oninput="update()">

        <div id="codeOutput" class="output-box" style="font-size: 0.9rem; text-align: left; white-space: pre-wrap;"></div>
        
        <button class="gen-btn" style="margin-top: 20px;" onclick="copyCode()">Copy Meta Tags</button>
    </section>

    <section class="seo-content">
        <h2>Why Meta Tags Matter</h2>
        <p>Meta tags are the digital storefront of your website. They control how Google and Facebook display your content to the world.</p>
    </section>
</div>

<script src="/nav.js"></script>
<script>
    function update() {
        const t = document.getElementById('title').value || "Title";
        const d = document.getElementById('desc').value || "Description";
        const u = document.getElementById('url').value || "https://site.com";
        const code = `<title>${t}</title>\n<meta name="description" content="${d}">`;
        document.getElementById('codeOutput').innerText = code;
    }
    function copyCode() {
        navigator.clipboard.writeText(document.getElementById('codeOutput').innerText);
        alert("Copied!");
    }
    update();
</script>
</body>
</html>
