<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text on Video Contrast Checker | Brixe</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/main-style.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --accent: #ff007f; --border: #334155; --bg: #05070a; }

        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        .layout-grid { display: grid; grid-template-columns: 1fr 320px; gap: 20px; margin-top: 20px; }

        /* Compact Phone View */
        .video-stage {
            background: #000; border: 1px solid var(--border); border-radius: 20px;
            position: relative; overflow: hidden; aspect-ratio: 9/16;
            height: 550px; margin: 0 auto;
        }

        #videoElement { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }

        /* Draggable Text Overlay (FULL 2D) */
        .text-overlay {
            position: absolute; 
            /* Start positioned slightly off-center top for intuition */
            top: 15%; left: 10%; 
            width: 80%; text-align: center; font-size: 1.8rem; font-weight: 900;
            line-height: 1.1; cursor: move; user-select: none;
            touch-action: none; z-index: 10; /* Ensure it's on top */
        }

        .sidebar { display: flex; flex-direction: column; gap: 15px; }
        .control-card { background: #0f172a; border: 1px solid var(--border); padding: 15px; border-radius: 15px; }
        .control-card h3 { font-family: 'Outfit'; font-size: 0.7rem; color: #64748b; text-transform: uppercase; margin-bottom: 12px; }

        label { display: block; font-size: 0.75rem; margin-bottom: 5px; color: #94a3b8; }
        input, select { width: 100%; background: #05070a; border: 1px solid var(--border); color: white; padding: 8px; border-radius: 8px; margin-bottom: 10px; }

        .score-box { text-align: center; padding: 20px; border-radius: 15px; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); }
        .ratio-display { font-family: 'Outfit'; font-size: 2rem; font-weight: 800; }
        .status-pill { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.65rem; font-weight: 800; }

        .btn-main { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 700; width: 100%; cursor: pointer; }
    </style>
</head>
<body data-theme="growth">
    <nav class="nav-container"></nav>

    <div class="container">
        <a href="visual-layout.html" class="back-btn">back to tools</a>
        
        <header style="text-align: center; margin-bottom: 20px;">
            <h1 style="font-family: 'Outfit'; font-size: 2.2rem;">Video Contrast Validator</h1>
            <p style="color: #64748b;">Move text anywhere on the screen to test visibility.</p>
        </header>

        <div class="layout-grid">
            <div class="video-stage" id="stage">
                <video id="videoElement" loop muted playsinline></video>
                <div id="textOverlay" class="text-overlay">DRAG ME</div>
                
                <div id="dropZone" style="position: absolute; width: 100%; text-align: center; top: 45%; z-index: 5;">
                    <button class="btn-main" style="width: auto; padding: 10px 20px;" onclick="document.getElementById('vidIn').click()">Upload Clip</button>
                    <input type="file" id="vidIn" hidden accept="video/*" onchange="initVideo(this)">
                </div>
            </div>

            <div class="sidebar">
                <div class="control-card">
                    <h3>Visual Styles</h3>
                    <label>Text Color</label>
                    <input type="color" id="textColor" value="#ffffff" oninput="updateUI()">
                    <label>Stroke Width</label>
                    <select id="strokeW" onchange="updateUI()">
                        <option value="0">None</option>
                        <option value="3">Thin Outline</option>
                        <option value="6" selected>Bold Outline</option>
                    </select>
                </div>

                <div class="score-box">
                    <h3>Visibility Score</h3>
                    <div class="ratio-display" id="ratioText">1:1</div>
                    <div id="statusPill" class="status-pill" style="background: #ef4444;">Awaiting Data</div>
                    <p id="feedback" style="font-size: 0.7rem; color: #64748b; margin-top: 10px;">Drag text to different regions.</p>
                </div>
                <canvas id="samplerCanvas" style="display:none;"></canvas>
            </div>
        </div>
    </div>

    <footer style="margin-top: 80px; padding: 60px 20px; background: #05070a; border-top: 1px solid #1e293b; text-align: center; color: #64748b;">
        <div style="max-width: 1200px; margin: 0 auto;">
            <h3 style="color: white; font-family: 'Outfit'; margin-bottom: 10px;">Brixe Engine</h3>
            <p style="font-size: 0.8rem;">Conversion Optimization Suite v2.5</p>
            <div style="height: 1px; background: linear-gradient(90deg, transparent, #1e293b, transparent); margin-bottom: 20px;"></div>
            <p style="font-size: 0.7rem;">© 2026 Brixe. Privacy-first local video processing.</p>
        </div>
    </footer>

    <script>
        const video = document.getElementById('videoElement');
        const overlay = document.getElementById('textOverlay');
        const stage = document.getElementById('stage');
        const canvas = document.getElementById('samplerCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        // --- FULL 2D DRAG LOGIC (Left, Right, Up, Down) ---
        let isDragging = false;
        let activePointerId = null;
        let initialX, initialY;
        let currentX, currentY;
        let xOffset = 0;
        let yOffset = 0;

        // Initialize position based on CSS start (top 15%, left 10%)
        // We need to delay this slightly until CSS is applied
        setTimeout(() => {
            const rect = overlay.getBoundingClientRect();
            const stageRect = stage.getBoundingClientRect();
            xOffset = rect.left - stageRect.left;
            yOffset = rect.top - stageRect.top;
        }, 100);

        function dragStart(e) {
            if (e.target === overlay) {
                isDragging = true;
                activePointerId = e.pointerId;
                
                // Get starting point relative to the element's current transform
                initialX = e.clientX - xOffset;
                initialY = e.clientY - yOffset;
                
                overlay.style.transition = 'none'; // Snappy dragging
                overlay.setPointerCapture(e.pointerId); // Keep tracking even if mouse leaves element
            }
        }

        function dragEnd(e) {
            if (isDragging && e.pointerId === activePointerId) {
                isDragging = false;
                activePointerId = null;
                overlay.releasePointerCapture(e.pointerId);
            }
        }

        function drag(e) {
            if (isDragging && e.pointerId === activePointerId) {
                e.preventDefault();
                
                currentX = e.clientX - initialX;
                currentY = e.clientY - initialY;

                // --- BOUNDARY CHECKING (Keep inside Phone) ---
                const stageRect = stage.getBoundingClientRect();
                const textRect = overlay.getBoundingClientRect();

                const minX = 0;
                const maxX = stageRect.width - textRect.width;
                const minY = 0;
                const maxY = stageRect.height - textRect.height;

                // Lock X (Left/Right)
                if (currentX < minX) currentX = minX;
                if (currentX > maxX) currentX = maxX;

                // Lock Y (Up/Down)
                if (currentY < minY) currentY = minY;
                if (currentY > maxY) currentY = maxY;

                xOffset = currentX;
                yOffset = currentY;

                // Apply the full 2D movement
                setTranslate(currentX, currentY, overlay);
            }
        }

        function setTranslate(xPos, yPos, el) {
            // Using transform is more performant than top/left
            el.style.transform = `translate3d(${xPos}px, ${yPos}px, 0)`;
            // Crucial: Reset CSS top/left so transform takes over cleanly
            el.style.top = '0';
            el.style.left = '0';
        }

        // Pointer Events handle both Mouse and Touch
        stage.addEventListener('pointerdown', dragStart);
        window.addEventListener('pointermove', drag);
        window.addEventListener('pointerup', dragEnd);


        // --- MECHANICAL CORE LOGIC (Pixels/Luminance) ---
        function initVideo(input) {
            const file = input.files[0];
            if (!file) return;
            video.src = URL.createObjectURL(file);
            video.play();
            document.getElementById('dropZone').style.display = 'none';
            updateUI();
            requestAnimationFrame(analyzeLoop);
        }

        function updateUI() {
            overlay.style.color = document.getElementById('textColor').value;
            overlay.style.webkitTextStroke = `${document.getElementById('strokeW').value}px black`;
        }

        function analyzeLoop() {
            if (!video.paused && !video.ended) {
                performSampling();
                requestAnimationFrame(analyzeLoop);
            }
        }

        function performSampling() {
            canvas.width = 100;
            canvas.height = 100;
            ctx.drawImage(video, 0, 0, 100, 100);
            const frame = ctx.getImageData(0, 0, 100, 100).data;
            let totalL = 0;
            for (let i = 0; i < frame.length; i += 40) {
                totalL += getLuminance(frame[i], frame[i+1], frame[i+2]);
            }
            const avgBgL = totalL / (frame.length / 40);
            const textHex = document.getElementById('textColor').value;
            const rgb = hexToRgb(textHex);
            const textL = getLuminance(rgb.r, rgb.g, rgb.b);
            const ratio = (Math.max(avgBgL, textL) + 0.05) / (Math.min(avgBgL, textL) + 0.05);
            
            document.getElementById('ratioText').innerText = ratio.toFixed(1) + ":1";
            const pill = document.getElementById('statusPill');
            pill.innerText = ratio >= 4.5 ? "PASS" : (ratio >= 3 ? "MID" : "FAIL");
            pill.style.background = ratio >= 4.5 ? "#22c55e" : (ratio >= 3 ? "#f59e0b" : "#ef4444");
        }

        function getLuminance(r, g, b) {
            const a = [r, g, b].map(v => {
                v /= 255;
                return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
            });
            return a[0] * 0.2126 + a[1] * 0.7152 + a[2] * 0.0722;
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : null;
        }
    </script>
    <script src="../nav.js"></script>
</body>
</html>
